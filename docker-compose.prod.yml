# =============================================================================
# Ventiqra - Production Docker Compose Override
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile app up -d
#
# This override hardens the deployment for production: removes port exposure
# for internal services, adds resource limits, and enables restart policies.
# =============================================================================

services:
  postgres:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    environment:
      ENV: production
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10

  frontend:
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.ventiqra.example.com}
    deploy:
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 10
